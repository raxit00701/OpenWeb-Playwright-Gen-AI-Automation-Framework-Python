name: OpenWebUI Automation

on:
  workflow_dispatch:
    inputs:

      execution_mode:
        description: Execution Mode
        required: true
        default: serial
        type: choice
        options:
          - serial
          - parallel

      browser:
        description: Browser
        required: true
        default: chrome
        type: choice
        options:
          - chrome
          - chromium
          - firefox
          - webkit
          - edge
          - all

      environment:
        description: Environment
        required: true
        default: test
        type: choice
        options:
          - test
          - dev
          - prod

      group:
        description: Test Group
        required: true
        default: all
        type: choice
        options:
          - all
          - chat
          - utility

      headless:
        description: Headless Mode
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

      incognito:
        description: Incognito Mode
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

      screenshot:
        description: Screenshot
        required: true
        default: off
        type: choice
        options:
          - on
          - off
          - only-on-failure

      video:
        description: Video Recording
        required: true
        default: off
        type: choice
        options:
          - on
          - off
          - retain-on-failure

      logs:
        description: Upload Logs
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:

  automation:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Browsers
        run: |
          python -m playwright install --with-deps

      - name: Install Allure
        run: |
          sudo apt-get update
          sudo apt-get install -y default-jre unzip

          ALLURE_VERSION=2.44.0

          wget https://github.com/allure-framework/allure2/releases/download/${ALLURE_VERSION}/allure-${ALLURE_VERSION}.tgz

          tar -xzf allure-${ALLURE_VERSION}.tgz

          sudo mv allure-${ALLURE_VERSION} /opt/allure

          echo "/opt/allure/bin" >> $GITHUB_PATH

          /opt/allure/bin/allure --version

      - name: Configure pytest.ini
        run: |
          sed -i "s/^env *=.*/env = ${{ github.event.inputs.environment }}/" pytest.ini
          sed -i "s/^headless *=.*/headless = ${{ github.event.inputs.headless }}/" pytest.ini
          sed -i "s/^incognito *=.*/incognito = ${{ github.event.inputs.incognito }}/" pytest.ini
          sed -i "s/^video *=.*/video = ${{ github.event.inputs.video }}/" pytest.ini
          sed -i "s/^screenshot *=.*/screenshot = ${{ github.event.inputs.screenshot }}/" pytest.ini

      - name: Run Tests
        shell: bash
        run: |

          MARKER=""

          if [ "${{ github.event.inputs.group }}" != "all" ]; then
            MARKER="-m ${{ github.event.inputs.group }}"
          fi

          run_pytest () {

            sed -i "s/^browser *=.*/browser = $1/" pytest.ini

            if [ "${{ github.event.inputs.execution_mode }}" = "parallel" ]; then
              pytest -n auto $MARKER
            else
              pytest -n 0 $MARKER
            fi
          }

          if [ "${{ github.event.inputs.browser }}" = "all" ]; then
            run_pytest chrome
            run_pytest chromium
            run_pytest firefox
            run_pytest webkit
            run_pytest edge
          else
            run_pytest ${{ github.event.inputs.browser }}
          fi

      - name: Debug Folder Structure
        if: always()
        run: |
          pwd
          ls -R

      - name: Generate Allure Report
        if: always()
        run: |
          if [ -d reports/allure-results ]; then
            allure generate reports/allure-results \
              -o reports/allure-report \
              --clean
          else
            echo "reports/allure-results not found."
          fi

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: reports/allure-report
          if-no-files-found: ignore

      - name: Upload Logs
        if: always() && github.event.inputs.logs == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: logs
          path: logs
          if-no-files-found: ignore

      - name: Upload Screenshots
        if: always() && github.event.inputs.screenshot != 'off'
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: screenshots
          if-no-files-found: ignore

      - name: Upload Videos
        if: always() && github.event.inputs.video != 'off'
        uses: actions/upload-artifact@v4
        with:
          name: videos
          path: videos
          if-no-files-found: ignore

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: reports/allure-results
          if-no-files-found: ignore
