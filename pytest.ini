[pytest]
# ============================================================
#  MASTER CONFIGURATION - All framework behaviour lives here
# ============================================================

# ---------- Execution mode ----------
# serial  → no parallelism (default)
# parallel → uses pytest-xdist; set worker count with --numprocesses
addopts =
    --numprocesses=0
    --alluredir=reports/allure-results
    --clean-alluredir
    -v

# ---------- Environment ----------
# Values: test | dev | prod
env = test

# ---------- Browser ----------
# Values: chromium | firefox | webkit | edge | chrome
browser = chrome
# ---------- Head / Headless ----------
# Values: true | false
headless = false

# ---------- Incognito / Normal ----------
# Values: true | false
incognito = false

# ---------- Video recording ----------
# Values: on | off | retain-on-failure
video = off

# ---------- Screenshots ----------
# Values: on | off | only-on-failure
screenshot = off

# ---------- Slow-motion delay (ms) ----------
slow_mo = 0

# ---------- Retry on failure ----------
# How many times to retry a failed test before marking it as FAILED
retries = 0

# ---------- Timeout (ms) ----------
timeout = 30000

# ---------- Test paths ----------
testpaths = tests

# ---------- Markers ----------
markers =
    smoke: quick sanity checks
    regression: full regression suite
    ui: UI-level tests
    api: API-level tests
    slow: tests that take a long time